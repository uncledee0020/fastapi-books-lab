trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - main.py
      - requirements.txt
      - Dockerfile
      - infrastructure/*
      - api-definitions/*
      - policies/*

variables:
  azureSubscription: 'azure-service-connection'
  # azureSubscription: 'Moringa School Cohort'
  resourceGroup: 'AzureDevelopers-MoringaSchool'
  acrName: 'acrbooksapidnm'
  appName: 'fastapi-books-api'
  apimName: 'apim-books-api-dnm'
  imageRepository: 'fastapi-books-api'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
  # Stage 1: Build and Push Books API Docker Image
  - stage: Build
    displayName: Build and Push Books API Image
    jobs:
      - job: Build
        displayName: Build Job
        pool:
          vmImage: $(vmImageName)
        # steps:
        #   - task: Docker@2
        #     displayName: Build and Push to ACR
        #     inputs:
        #       command: buildAndPush
        #       repository: $(imageRepository)
        #       dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        #       containerRegistry: '$(azureSubscription)'
        #       tags: |
        #         $(tag)
        #         latest
        steps:
          # Use your working AzureRM connection to log into Docker natively
          - task: AzureCLI@2
            displayName: Log into ACR and Push Image
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # 1. Log into your Azure Container Registry
                az acr login --name $(acrName)
                
                # 2. Build the Docker image
                docker build -t $(acrName).azurecr.io/$(imageRepository):$(tag) -t $(acrName).azurecr.io/$(imageRepository):latest -f $(Build.SourcesDirectory)/Dockerfile $(Build.SourcesDirectory)
                
                # 3. Push both tags to the registry
                docker push $(acrName).azurecr.io/$(imageRepository):$(tag)
                docker push $(acrName).azurecr.io/$(imageRepository):latest

  # Stage 2: Deploy Books API to App Service
  - stage: DeployApp
    displayName: Deploy Books API App
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployApp
        displayName: Deploy to App Service
        pool:
          vmImage: $(vmImageName)
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: Deploy Books API Container
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appName: $(appName)
                    containers: '$(acrName).azurecr.io/$(imageRepository):$(tag)'

                - task: AzureCLI@2
                  displayName: Verify Books API Deployment
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      sleep 30
                      curl -f "https://$(appName).azurewebsites.net/books" || exit 1
                      curl -f "https://$(appName).azurewebsites.net/openapi.json" || exit 1
