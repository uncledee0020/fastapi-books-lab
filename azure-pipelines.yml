trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - main.py
      - requirements.txt
      - Dockerfile
      - infrastructure/*
      - api-definitions/*
      - policies/*

variables:
  resourceGroup: 'AzureDevelopers-MoringaSchool'
  acrName: 'acrbooksapidnm'
  appName: 'fastapi-books-api'
  apimName: 'apim-books-api-dnm'
  imageRepository: 'fastapi-books-api'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'
  # Note: Add ACR_PASSWORD as a secret pipeline variable in Azure DevOps UI

stages:
  # Stage 1: Build and Push Books API Docker Image
  - stage: Build
    displayName: Build and Push Books API Image
    jobs:
      - job: Build
        displayName: Build Job
        pool:
          vmImage: $(vmImageName)
        steps:
          - script: |
              # Log in using standard docker CLI via ACR Admin credentials
              echo "$(ACR_PASSWORD)" | docker login $(acrName).azurecr.io -u $(acrName) --password-stdin
              
              # Build the image with both build ID and latest tags
              docker build -t $(acrName).azurecr.io/$(imageRepository):$(tag) -t $(acrName).azurecr.io/$(imageRepository):latest -f $(Build.SourcesDirectory)/Dockerfile $(Build.SourcesDirectory)
              
              # Push both tags to your Azure Container Registry
              docker push $(acrName).azurecr.io/$(imageRepository):$(tag)
              docker push $(acrName).azurecr.io/$(imageRepository):latest
            displayName: 'Docker Login, Build, and Push via Admin Key'

  # Stage 2: Deploy Books API to App Service
  # - stage: DeployApp
  #   displayName: Deploy Books API App
  #   dependsOn: Build
  #   condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  #   jobs:
  #     - deployment: DeployApp
  #       displayName: Deploy to App Service
  #       pool:
  #         vmImage: $(vmImageName)
  #       environment: 'production'
  #       strategy:
  #         runOnce:
  #           deploy:
  #             steps:
  #               # Deploy using the exact same ACR Admin keys to update App Service container settings
  #               - task: AzureWebAppContainer@1
  #                 displayName: Deploy Books API Container
  #                 inputs:
  #                   azureSubscription: 'azure-service-connection'
  #                   appName: $(appName)
  #                   containers: '$(acrName).azurecr.io/$(imageRepository):$(tag)'

  - stage: DeployApp
    displayName: Deploy Books API App
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployApp
        displayName: Deploy to App Service
        pool:
          vmImage: $(vmImageName)
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                # Bypass AzureWebAppContainer by using Web App config update commands directly
                - script: |
                    echo "Setting App Service container configuration..."
                    
                    # Force the App Service to update its deployment source using your image URL
                    # Note: This shell script approach cleanly sidesteps the broken MSI subscription validation.
                    az webapp config container set \
                      --name $(appName) \
                      --resource-group $(resourceGroup) \
                      --docker-custom-image-name "$(acrName).azurecr.io/$(imageRepository):$(tag)" \
                      --docker-registry-server-url "https://$(acrName).azurecr.io" \
                      --docker-registry-server-user "$(acrName)" \
                      --docker-registry-server-password "$(ACR_PASSWORD)"
                  displayName: 'Deploy Container via Azure CLI Workaround'

                - task: AzureCLI@2
                  displayName: Verify Books API Deployment
                  inputs:
                    azureSubscription: 'azure-service-connection'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      sleep 30
                      curl -f "https://$(appName).azurewebsites.net/books" || exit 1
                      curl -f "https://$(appName).azurewebsites.net/openapi.json" || exit 1