trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - main.py
      - requirements.txt
      - Dockerfile
      - infrastructure/*
      - api-definitions/*
      - policies/*

variables:
  resourceGroup: 'AzureDevelopers-MoringaSchool'
  acrName: 'acrbooksapidnm'
  appName: 'app-books-api-dnm' 
  apimName: 'apim-books-api-dnm'
  imageRepository: 'fastapi-books-api'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
  # Stage 1: Build and Push
  - stage: Build
    displayName: Build and Push Books API Image
    jobs:
      - job: BuildJob
        displayName: Build and Push Job
        pool:
          vmImage: $(vmImageName)
        steps:
          - script: |
              echo "Logging into Docker via ACR Access Keys..."
              echo "$(ACR_PASSWORD)" | docker login $(acrName).azurecr.io -u $(acrName) --password-stdin
              
              echo "Building Docker Image..."
              docker build -t $(acrName).azurecr.io/$(imageRepository):$(tag) -t $(acrName).azurecr.io/$(imageRepository):latest -f $(Build.SourcesDirectory)/Dockerfile $(Build.SourcesDirectory)
              
              echo "Pushing Image Tags to Registry..."
              docker push $(acrName).azurecr.io/$(imageRepository):$(tag)
              docker push $(acrName).azurecr.io/$(imageRepository):latest
            displayName: 'Docker Login, Build, and Push'

  # Stage 2: Visible Deployment Step (Webhook Handover)
  - stage: DeployApp
    displayName: Deploy Books API App
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployApp
        displayName: Deploy via Webhook Sync
        pool:
          vmImage: $(vmImageName)
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Image successfully pushed to ACR."
                    echo "Triggering automated Azure Container Webhook sync for $(appName)..."
                    echo "Waiting for Azure App Service to pull the latest image layer..."
                  displayName: 'Handoff to Azure Webhook Deployment'

  # Stage 3: Verification
  - stage: VerifyDeployment
    displayName: Verify App Sync Status
    dependsOn: DeployApp
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: VerificationJob
        displayName: Web Routing Verification
        pool:
          vmImage: $(vmImageName)
        steps:
          - script: |
              echo "Waiting 60 seconds for container startup..."
              sleep 60
              
              echo "Testing Live App Routing Endpoints..."
              curl -f "https://$(appName).azurewebsites.net/books" || exit 1
              curl -f "https://$(appName).azurewebsites.net/openapi.json" || exit 1
            displayName: 'Verify App Routing Endpoint'


  # Stage 4: Deploy Books API to APIM
  - stage: DeployAPIM
    displayName: Deploy Books API to APIM
    dependsOn: DeployApp
    condition: succeeded()
    jobs:
      - job: DeployAPIM
        displayName: Deploy API and Policies
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: AzureCLI@2
            displayName: Import Books API into APIM
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az apim api import                   --resource-group $(resourceGroup)                   --service-name $(apimName)                   --api-id books-api                   --path books                   --specification-format OpenApiJson                   --specification-url "https://$(appName).azurewebsites.net/openapi.json"                   --display-name "Books API"

          - task: AzureCLI@2
            displayName: Update Books API Policy
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az apim api policy create                   --resource-group $(resourceGroup)                   --service-name $(apimName)                   --api-id books-api                   --policy-format xml                   --value $(Build.SourcesDirectory)/policies/books-api-policy.xml

          - task: AzureCLI@2
            displayName: Update Global Policy
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az apim policy create                   --resource-group $(resourceGroup)                   --service-name $(apimName)                   --policy-format xml                   --value $(Build.SourcesDirectory)/policies/global-policy.xml

  - stage: DeployDev
    displayName: Deploy Books API to Development
    jobs:
      - deployment: DeployDev
        environment: 'development'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: bash
                    inlineScript: |
                      az deployment group create                         --resource-group rg-books-api-dev                         --template-file infrastructure/azuredeploy.json                         --parameters infrastructure/azuredeploy.parameters.dev.json

                      az apim api import                         --resource-group rg-books-api-dev                         --service-name apim-books-api-dev                         --api-id books-api                         --path books                         --specification-format OpenApiJson                         --specification-url "https://app-books-api-dev.azurewebsites.net/openapi.json"

